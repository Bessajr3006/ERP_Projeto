# Compose para desenvolvimento/local (sem Traefik)
# Uso:
#   docker compose -f docker-compose.local.yml up --build

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-bessa_erp}
      MARIADB_USER: ${MARIADB_USER:-erp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-30mariafn@}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-30mariafn@}
      MARIADB_ROOT_HOST: ${MARIADB_ROOT_HOST:-%}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping --socket=/run/mysqld/mysqld.sock -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    volumes:
      - mariadb:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: projeto_erp_bessa-app:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-America/Sao_Paulo}

      DATA_DIR: /data

      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bessa_erp}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-30mariafn@}

      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-90d}
      SALT_ROUNDS: ${SALT_ROUNDS:-10}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_me}

      MARIADB_DATABASE: ${MARIADB_DATABASE:-bessa_erp}
      MARIADB_USER: ${MARIADB_USER:-erp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-30mariafn@}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-30mariafn@}

    volumes:
      - app_data:/data
    command: sh -c "node dist/scripts/initdb.js && npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    ports:
      - "3001:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: projeto_erp_bessa-frontend:local
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-256M}
    ports:
      - "8082:80"
    profiles: ["tools"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: projeto_erp_bessa-app:local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-America/Sao_Paulo}

      DATA_DIR: /data

      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bessa_erp}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-30mariafn@}

      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-90d}
      SALT_ROUNDS: ${SALT_ROUNDS:-10}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_me}

      MARIADB_DATABASE: ${MARIADB_DATABASE:-bessa_erp}
      MARIADB_USER: ${MARIADB_USER:-erp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-30mariafn@}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-30mariafn@}

    volumes:
      - app_data:/data
    command: npm run start:worker
    healthcheck:
      disable: true
    profiles: ["worker"]

volumes:
  mariadb:
    name: mariadb
    external: true
  app_data:
