<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Autenticação</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body class="bg-gray-50 dark:bg-slate-900 min-h-screen flex flex-col">

    <main class="flex flex-1 items-center justify-center px-4 py-10">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 dark:text-white uppercase tracking-widest title-font">KEYSTONE</h1>
            <p class="text-gray-500 dark:text-gray-300 mt-2">Faça login para acessar o sistema</p>
        </div>

        <!-- Alertas de Erro/Sucesso (Oculto por padrão) -->
        <div id="alertMessage" class="hidden mb-4 p-4 rounded-md text-sm"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                <input type="email" id="email" name="email" required autocomplete="username"
                    class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500 transition-colors">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Senha</label>
                <div class="relative mt-1">
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="block w-full px-4 py-3 pr-10 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500 transition-colors">
                    <button type="button" id="togglePasswordBtn" tabindex="-1" title="Mostrar ou ocultar senha" aria-label="Mostrar ou ocultar senha"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center justify-center text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none z-10">
                        <svg id="eyeIconOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eyeIconClosed" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full inline-flex items-center justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
            Não tem uma conta? <a href="/register.html" class="text-brand-600 hover:text-brand-500 font-medium">Cadastre
                sua empresa</a>
        </div>

        <div class="mt-4 flex justify-center">
            <button type="button"
                class="pwaInstallBtn hidden rounded-lg border border-brand-600 px-4 py-2 text-sm font-semibold text-brand-600 hover:bg-brand-50 dark:border-brand-400 dark:text-brand-400 dark:hover:bg-slate-700">
                Instalar App
            </button>
        </div>
    </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>


</body>

</html>
