<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Balanço Patrimonial</title>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body data-required-module="balanco" class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">
    <div id="app-navbar"></div>

    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">
        <!-- ── PAGE HEADER ─────────────────────────────────────────── -->
        <div class="px-4 sm:px-0 mb-5 flex flex-wrap justify-between items-center gap-3 shrink-0">
            <div class="flex items-center gap-3">
                <div>
                    <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100 leading-tight">Balanço Patrimonial</h1>
                </div>
            </div>
        </div>

        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm shrink-0"></div>

        <div class="px-4 sm:px-0 flex flex-col xl:flex-row gap-5 flex-1 min-h-0">
            <!-- COLUNA: BALANÇO -->
            <div class="flex-1 flex flex-col min-w-0 min-h-0">
                <div id="balancoSection" class="bg-white dark:bg-slate-800 shadow-sm rounded-xl border border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-0 overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                            <span class="w-1.5 h-4 bg-brand-500 rounded-full inline-block"></span>
                            Análise Patrimonial
                        </h3>
                        
                        <!-- Mini Filtro Header -->
                        <div class="flex flex-wrap items-center gap-2">
                            <label class="inline-flex items-center cursor-pointer mr-3">
                                <span class="select-none font-medium text-xs text-gray-600 dark:text-gray-300 mr-2">Ocultar Zeradas</span>
                                <input type="checkbox" id="chkHideZero" class="sr-only peer" checked title="Ocultar contas zeradas" aria-label="Ocultar contas zeradas" data-bwignore="true" data-lpignore="true">
                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-300 dark:peer-focus:ring-brand-800 rounded-full peer dark:bg-slate-700 peer-checked:bg-brand-600 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full peer-checked:after:border-white"></div>
                            </label>

                            <label class="inline-flex items-center cursor-pointer mr-3">
                                <span class="select-none font-medium text-xs text-gray-600 dark:text-gray-300 mr-2">Resumido (Sintéticas)</span>
                                <input type="checkbox" id="chkOnlySynthetic" class="sr-only peer" title="Mostrar somente contas sintéticas" aria-label="Mostrar somente contas sintéticas" data-bwignore="true" data-lpignore="true">
                                <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-300 dark:peer-focus:ring-brand-800 rounded-full peer dark:bg-slate-700 peer-checked:bg-brand-600 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full peer-checked:after:border-white"></div>
                            </label>
                            
                            <span class="text-xs text-gray-500">Posição até</span>
                            <input type="date" id="filterEndDate" title="Data final do balanço" aria-label="Data final do balanço" class="h-7 text-xs bg-white dark:bg-slate-900 rounded border border-gray-300 dark:border-slate-600 px-2 py-0 text-gray-700 dark:text-gray-300 focus:ring-1 focus:ring-brand-500" data-bwignore="true" data-lpignore="true">
                            <button type="button" id="btnApplyFilter" class="h-7 px-3 bg-brand-600 hover:bg-brand-500 text-white rounded text-xs font-semibold shadow-sm transition-colors">
                                Gerar Balanço
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                        <table class="min-w-full divide-y divide-gray-100 dark:divide-slate-700/60">
                            <thead class="bg-gray-200 dark:bg-slate-900/60 border-y border-gray-300 dark:border-slate-700 sticky top-0 z-20">
                                <tr>
                                    <th scope="col" class="sticky top-0 z-20 bg-gray-200 dark:bg-slate-900/60 px-3 py-2.5 text-left text-[11px] font-extrabold text-gray-800 dark:text-gray-300 uppercase tracking-wider border-y border-gray-300 dark:border-transparent w-[65%]">
                                        Descrição da Conta
                                    </th>
                                    <th scope="col" class="sticky top-0 z-20 bg-gray-200 dark:bg-slate-900/60 px-3 py-2.5 text-right text-[11px] font-extrabold text-gray-800 dark:text-gray-300 uppercase tracking-wider border-y border-gray-300 dark:border-transparent w-[20%]">
                                        Saldo (R$)
                                    </th>
                                    <th scope="col" class="sticky top-0 z-20 bg-gray-200 dark:bg-slate-900/60 px-3 py-2.5 text-right text-[11px] font-extrabold text-gray-800 dark:text-gray-300 uppercase tracking-wider border-y border-gray-300 dark:border-transparent w-[15%]">
                                        AV (%)
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="balancoTableBody" class="bg-white dark:bg-slate-800 divide-y divide-gray-100 dark:divide-slate-700/40">
                                <tr>
                                    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">
                                        Use os filtros acima para gerar o balanço patrimonial.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="balancoTableFooter" class="hidden"></div>
            </div>
        </div>
    </main>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 mb-0 lg:mb-0 items-center justify-center">
        <div class="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-2xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-600 dark:border-brand-400"></div>
            <p class="mt-4 text-sm font-medium text-gray-900 dark:text-white" id="loading-text">Processando Balanço...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components/crud-manager.js"></script>
    <script src="/js/balanco.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>
</html>
