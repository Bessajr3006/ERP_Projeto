<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Fechamento</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body data-required-module="fechamento" class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <div id="app-navbar"></div>

    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">

        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <div class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <!-- Cabeçalho fixo -->
            <div class="bg-white dark:bg-slate-800 shadow-sm rounded-t-xl border border-b border-gray-200 dark:border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-2 shrink-0">
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">Fechamentos</h3>
                <div class="flex items-center gap-3">
                    <button type="button" id="btnOpenModal" title="Novo Lançamento"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent p-2 bg-brand-600 text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span class="hidden sm:inline-block ml-2">Novo Lançamento</span>
                    </button>
                </div>
            </div>
            
            <div id="fechamentosSection" class="bg-white dark:bg-slate-800 shadow-sm border border-t-0 border-b-0 border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-0">
                <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                        <thead class="sticky top-0 z-10 shadow-[0_1px_0_rgba(229,231,235,1)] dark:shadow-[0_1px_0_rgba(51,65,85,1)] bg-gray-50 dark:bg-slate-900/50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Empresa
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Total Compra
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Total Venda
                                </th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Ações
                                </th>
                            </tr>
                        </thead>
                        <tbody id="fechamentosTable" class="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">
                                    Nenhum fechamento registrado.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="fechamentoModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true" id="modalBackdrop"></div>
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-3xl sm:w-full">
                <form id="fechamentoForm" action="#" method="POST" novalidate>
                    <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="lg:flex sm:items-start">
                            <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100" id="modalTitle">Lançar Fechamento</h3>
                                
                                <div class="mt-4">
                                    <label for="companyParam" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Cliente <span class="text-red-500">*</span></label>
                                    <select id="companyParam" name="customerId" required class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                                        <option value="">Carregando clientes...</option>
                                    </select>
                                </div>

                                <div class="mt-6 border-b border-gray-200 dark:border-slate-700">
                                    <nav class="-mb-px flex gap-4" role="tablist" aria-label="Abas de Fechamento">
                                        <button type="button" id="tabCompraBtn"
                                            class="fechamento-tab whitespace-nowrap border-b-2 border-brand-500 px-1 pb-2 text-sm font-medium text-brand-600 dark:text-brand-300"
                                            role="tab" aria-selected="true" data-tab-target="tabCompraPanel">
                                            Compra
                                        </button>
                                        <button type="button" id="tabVendaBtn"
                                            class="fechamento-tab whitespace-nowrap border-b-2 border-transparent px-1 pb-2 text-sm font-medium text-gray-500 dark:text-gray-400"
                                            role="tab" aria-selected="false" data-tab-target="tabVendaPanel">
                                            Venda
                                        </button>
                                        <button type="button" id="tabApuracaoBtn"
                                            class="fechamento-tab whitespace-nowrap border-b-2 border-transparent px-1 pb-2 text-sm font-medium text-gray-500 dark:text-gray-400"
                                            role="tab" aria-selected="false" data-tab-target="tabApuracaoPanel">
                                            Apuração
                                        </button>
                                    </nav>
                                </div>
                                
                                <!-- Aba Compra -->
                                <div id="tabCompraPanel" class="fechamento-tab-panel mt-4 space-y-4" role="tabpanel">
                                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                                        <div>
                                            <label for="compra_valor" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Compra</label>
                                            <input type="text" id="compra_valor" name="compra_valor" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="compra_bs_icms" class="block text-sm font-medium text-gray-700 dark:text-gray-300">BS ICMS</label>
                                            <input type="text" id="compra_bs_icms" name="compra_bs_icms" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="compra_isento" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Isento</label>
                                            <input type="text" id="compra_isento" name="compra_isento" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="compra_outros" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Outros</label>
                                            <input type="text" id="compra_outros" name="compra_outros" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="compra_pis" class="block text-sm font-medium text-gray-700 dark:text-gray-300">PIS</label>
                                            <input type="text" id="compra_pis" name="compra_pis" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="compra_cofins" class="block text-sm font-medium text-gray-700 dark:text-gray-300">COFINS</label>
                                            <input type="text" id="compra_cofins" name="compra_cofins" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                    </div>
                                </div>

                                <!-- Aba Venda -->
                                <div id="tabVendaPanel" class="fechamento-tab-panel hidden mt-4 space-y-4" role="tabpanel">
                                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                                        <div>
                                            <label for="venda_valor" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Venda</label>
                                            <input type="text" id="venda_valor" name="venda_valor" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="venda_bs_icms" class="block text-sm font-medium text-gray-700 dark:text-gray-300">BS ICMS</label>
                                            <input type="text" id="venda_bs_icms" name="venda_bs_icms" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="venda_isento" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Isento</label>
                                            <input type="text" id="venda_isento" name="venda_isento" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="venda_outros" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Outros</label>
                                            <input type="text" id="venda_outros" name="venda_outros" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="venda_pis" class="block text-sm font-medium text-gray-700 dark:text-gray-300">PIS</label>
                                            <input type="text" id="venda_pis" name="venda_pis" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="venda_cofins" class="block text-sm font-medium text-gray-700 dark:text-gray-300">COFINS</label>
                                            <input type="text" id="venda_cofins" name="venda_cofins" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                    </div>
                                </div>

                                <!-- Aba Apuração -->
                                <div id="tabApuracaoPanel" class="fechamento-tab-panel hidden mt-4 space-y-4" role="tabpanel">
                                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                                        <div>
                                            <label for="apuracao_icms" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Apurado ICMS</label>
                                            <input type="text" id="apuracao_icms" name="apuracao_icms" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="apuracao_pis" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Apurado PIS</label>
                                            <input type="text" id="apuracao_pis" name="apuracao_pis" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                        <div>
                                            <label for="apuracao_cofins" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Apurado COFINS</label>
                                            <input type="text" id="apuracao_cofins" name="apuracao_cofins" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="R$ 0,00">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 lg:flex lg:flex-row-reverse dark:border-t dark:border-slate-700">
                        <button type="submit" id="saveBtn"
                            class="w-full inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:ml-3 sm:w-auto sm:text-sm">
                            Salvar
                        </button>
                        <button type="button" id="btnCancelModal"
                            class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/components/navbar.js"></script>
    <script src="/js/fechamento.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>
</html>
