<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Lançamento de Serviço</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body data-required-module="service_launches" class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <div id="app-navbar"></div>

    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">
        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <div class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <div class="bg-white dark:bg-slate-800 shadow-sm rounded-t-xl border border-b border-gray-200 dark:border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-2 shrink-0">
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">Lançamento de Serviço</h3>
                <div class="flex items-center gap-3">
                    <div class="relative w-full sm:w-80">
                        <input type="text" id="filterSearch" placeholder="Buscar por cliente, serviço ou observação"
                            class="w-full rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 py-2 pl-10 pr-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"></path>
                            </svg>
                        </div>
                    </div>
                    <button type="button" id="btnOpenModal" title="Novo Lançamento"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent p-2 bg-brand-600 text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </div>

            <div id="serviceLaunchSection" class="bg-white dark:bg-slate-800 shadow-sm border border-t-0 border-gray-200 dark:border-slate-700 rounded-b-xl flex flex-col flex-1 min-h-0">
                <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                        <thead class="sticky top-0 z-10 shadow-[0_1px_0_rgba(229,231,235,1)] dark:shadow-[0_1px_0_rgba(51,65,85,1)] bg-gray-50 dark:bg-slate-900/50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Cliente</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Serviço</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Qtd</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Valor Unit.</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Total</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Data</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="serviceLaunchTable" class="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="7" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">Nenhum lançamento cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="serviceLaunchModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true" id="modalBackdrop"></div>
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <form id="serviceLaunchForm" action="#" method="POST">
                    <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100" id="modalTitle">Novo Lançamento de Serviço</h3>
                            <div class="mt-4 space-y-4">
                                <input type="hidden" id="serviceLaunchId" name="serviceLaunchId" value="" data-bwignore="true" data-lpignore="true" placeholder="">

                                <div>
                                    <label for="launchCustomer" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Cliente <span class="text-red-500">*</span></label>
                                    <select id="launchCustomer" name="launchCustomer" required
                                        class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                        <option value="">Selecione...</option>
                                    </select>
                                </div>

                                <div>
                                    <label for="launchService" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Serviço <span class="text-red-500">*</span></label>
                                    <select id="launchService" name="launchService" required
                                        class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                        <option value="">Selecione...</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                    <div>
                                        <label for="launchQuantity" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Quantidade <span class="text-red-500">*</span></label>
                                        <input type="number" id="launchQuantity" name="launchQuantity" required min="0.01" step="0.01" value="1"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                    </div>
                                    <div>
                                        <label for="launchUnitPrice" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Valor Unit. <span class="text-red-500">*</span></label>
                                        <input type="number" id="launchUnitPrice" name="launchUnitPrice" required min="0" step="0.01"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                    </div>
                                    <div>
                                        <label for="launchTotal" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Total</label>
                                        <input type="text" id="launchTotal" name="launchTotal" readonly
                                            class="mt-1 block w-full bg-gray-50 dark:bg-slate-900 text-gray-700 dark:text-gray-200 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 sm:text-sm">
                                    </div>
                                </div>

                                <div>
                                    <label for="launchObservation" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Observação</label>
                                    <textarea id="launchObservation" name="launchObservation" rows="3"
                                        class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="Informações adicionais do lançamento"></textarea>
                                </div>

                                <div class="rounded-lg border border-gray-200 dark:border-slate-700 p-3">
                                    <label class="inline-flex items-center gap-2 text-sm font-medium text-gray-700 dark:text-gray-300 cursor-pointer">
                                        <input type="checkbox" id="launchCreateRevenue" name="launchCreateRevenue"
                                            class="rounded border-gray-300 text-brand-600 focus:ring-brand-500 dark:border-slate-600 dark:bg-slate-800">
                                        Lançar em receita
                                    </label>

                                    <div id="launchRevenueFields" class="hidden mt-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div>
                                            <label for="launchRevenueCategory" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Categoria da Receita <span class="text-red-500">*</span></label>
                                            <select id="launchRevenueCategory" name="launchRevenueCategory"
                                                class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                                <option value="">Selecione...</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label for="launchRevenueBank" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Conta de Destino <span class="text-red-500">*</span></label>
                                            <select id="launchRevenueBank" name="launchRevenueBank"
                                                class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                                <option value="">Selecione...</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label for="launchRevenueDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Data da Receita <span class="text-red-500">*</span></label>
                                            <input type="date" id="launchRevenueDate" name="launchRevenueDate"
                                                class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                        </div>

                                        <div>
                                            <label for="launchRevenuePaymentMethod" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Forma de Pagamento <span class="text-red-500">*</span></label>
                                            <select id="launchRevenuePaymentMethod" name="launchRevenuePaymentMethod"
                                                class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                                <option value="">Selecione...</option>
                                                <option value="pix">PIX</option>
                                                <option value="cash">Dinheiro</option>
                                                <option value="credit">Cartão de Crédito</option>
                                                <option value="debit">Cartão de Débito</option>
                                                <option value="transfer">Transferência</option>
                                                <option value="boleto">Boleto</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 flex flex-row-reverse dark:border-t dark:border-slate-700">
                        <button type="submit" id="saveBtn"
                            class="w-full inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:ml-3 sm:w-auto sm:text-sm">Salvar</button>
                        <button type="button" id="btnCancelModal"
                            class="mt-3 w-full inline-flex items-center justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/lancamento_servico.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>

</html>
