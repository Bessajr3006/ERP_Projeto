<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Separação de Pedidos</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <!-- Navbar -->
    <div id="app-navbar"></div>

    <!-- Main Content -->
    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-x-hidden overflow-y-auto">

        <div class="px-4 sm:px-0 mb-6">
            <div class="flex flex-wrap justify-between items-center gap-3">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Separação de Pedidos</h1>
                </div>
                <div class="flex items-center flex-wrap justify-end gap-2 w-full sm:w-auto">
                    <div class="hidden sm:flex items-center bg-white dark:bg-slate-800 p-1 rounded-full border border-gray-200 dark:border-slate-700 mr-2 sm:mr-4 shadow-sm">
                    <button type="button" id="btnListView" title="Visualização em Lista" class="flex items-center justify-center px-3 py-1.5 rounded-lg bg-brand-100 dark:bg-brand-900/40 text-brand-700 dark:text-brand-300 shadow-sm transition-all focus:outline-none gap-1">
                        <svg class="w-4 h-4 mr-1 check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <button type="button" id="btnGridView" title="Visualização em Cards" class="flex items-center justify-center px-3 py-1.5 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all focus:outline-none gap-1">
                        <svg class="w-4 h-4 mr-1 check-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                            </path>
                        </svg>
                    </button>
                </div>
                    <button type="button" id="btnRefresh"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Atualizar
                    </button>
                </div>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-2 sm:gap-3">
                <label for="pickingSelectAll" class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 cursor-pointer select-none">
                    <input type="checkbox" id="pickingSelectAll" class="h-4 w-4 rounded border-gray-300 dark:border-slate-600 text-brand-600 focus:ring-brand-500 dark:bg-slate-800">
                    Selecionar todos
                </label>
                <button
                    type="button"
                    id="btnDeleteSelectedPicking"
                    class="hidden items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-red-600 text-sm font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
                    disabled
                >
                    Excluir selecionados
                </button>
            </div>
        </div>

        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <!-- Pedidos Grid -->
        <div id="ordersSection" class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <div id="ordersGrid" class="overflow-y-auto flex-1 min-h-0 p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 content-start">
                <!-- Cards renderizados dinamicamente pelo picking.js -->
                <div class="col-span-full py-8 text-center text-gray-500 font-medium bg-gray-50 dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700">
                    Carregando pedidos pendentes...
                </div>
            </div>
        </div>
    </main>

    <!-- Modal View Items -->
    <div id="pickingModal" class="hidden fixed inset-0 z-100 items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity p-4">
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl w-[95%] max-w-3xl max-h-[90vh] shadow-2xl overflow-hidden border border-gray-100 dark:border-slate-700 flex flex-col transform transition-all relative z-10">
            <!-- Header -->
            <div
                class="px-6 py-4 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center bg-gray-50/50 dark:bg-slate-800/50 shrink-0">
                <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100" id="modalOrderTitle">Itens para Separação</h3>
                <button type="button" id="btnCloseModalTop"
                    class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700">
                    <span class="sr-only">Fechar</span>
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <!-- Content -->
            <div class="p-6 overflow-y-auto flex-1 bg-white dark:bg-slate-800">
                <div id="pickingContent" class="space-y-4">
                    <!-- Itens renderizados aqui -->
                </div>
            </div>
            
            <!-- Footer -->
            <div class="px-6 py-4 flex flex-col sm:flex-row justify-between gap-3 border-t border-gray-100 dark:border-slate-700 bg-gray-50 dark:bg-slate-900/50 shrink-0">
                <div class="flex-1">
                    <button type="button" id="btnCompletePicking" disabled class="w-full sm:w-auto inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-green-600 text-base font-bold text-white transition-colors focus:outline-none focus:ring-2 focus:ring-green-500 sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-gray-400 hover:bg-green-700 disabled:hover:bg-gray-400">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Concluído
                    </button>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button type="button" id="btnPrintOrder" class="inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 sm:w-auto sm:text-sm transition-colors">
                        Imprimir Romaneio
                    </button>
                    <button type="button" id="btnCloseModal" class="inline-flex justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none sm:w-auto sm:text-sm transition-colors">
                        Fechar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/filter-panel.js"></script>
    <script src="/js/picking.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>

</html>
