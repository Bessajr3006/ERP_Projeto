<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - POS</title>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>
<body class="bg-gray-100 dark:bg-slate-900 h-dvh text-gray-800 font-sans flex flex-col overflow-hidden">

    <div class="relative z-50">
        <div id="app-navbar" class="flex-none"></div>
    </div>

    <main id="vue-app" class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden relative z-0">


        <div class="pos-grid cart-hidden relative bg-white dark:bg-slate-800 border-none sm:border-solid sm:border border-gray-200 dark:border-slate-700 rounded-none sm:rounded-lg shadow-none sm:shadow-sm">

        <!-- Main Content - Produtos -->
        <div class="h-full flex flex-col bg-gray-50 dark:bg-slate-900/50 relative">
            <!-- Search bar & Comanda -->
            <div class="p-4 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-stretch md:items-center z-0 gap-3">
                <div class="w-full min-w-0 md:w-auto">
                    <!-- Tabs -->
                    <div class="pos-tab-shell bg-gray-100 dark:bg-slate-700/50 p-1 rounded-lg md:w-auto">
                        <button type="button" id="tabProdutosBtn" class="pos-tab-btn min-w-0 flex-1 md:flex-none truncate whitespace-nowrap px-3 sm:px-4 py-1.5 text-sm font-medium rounded-lg bg-white dark:bg-slate-800 text-brand-600 dark:text-brand-400 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-brand-500">Produtos</button>
                        <button type="button" id="tabComandasBtn" class="pos-tab-btn min-w-0 flex-1 md:flex-none truncate whitespace-nowrap px-3 sm:px-4 py-1.5 text-sm font-medium rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 transition-all focus:outline-none focus:ring-2 focus:ring-brand-500">Comandas</button>
                    </div>
                </div>
                <div class="grid w-full grid-cols-1 gap-2 sm:grid-cols-[auto,minmax(0,1fr)] sm:items-center md:w-auto md:min-w-65 md:ml-auto">
                    <label for="orderNumberInput" class="text-sm text-gray-500 dark:text-gray-400 font-medium whitespace-nowrap">Comanda/Mesa:</label>
                    <div class="flex items-center min-w-0 w-full">
                        <input type="text" placeholder="Ex: 12" class="min-w-0 flex-1 md:w-24 py-2 px-3 border border-gray-300 dark:border-slate-600 rounded-l-lg bg-white dark:bg-slate-700 text-gray-900 dark:text-gray-100 text-center font-bold focus:ring-brand-500 focus:border-brand-500 sm:text-sm uppercase shadow-sm" id="orderNumberInput" name="orderNumberInput" data-bwignore="true" data-lpignore="true" placeholder="">
                        <button type="button" id="searchComandaBtn" class="shrink-0 bg-brand-600 hover:bg-brand-700 text-white p-2 rounded-r-lg shadow-sm border border-transparent transition-colors h-9.5 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-brand-500" title="Buscar / Acessar Comanda">
                            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Products Grid Scrollable -->
            <div class="flex-1 overflow-y-auto px-4 sm:px-6 py-6 category-scroll flex flex-col relative">
                
                <!-- Open Comandas Tab Content -->
                <div id="comandasTabContent" class="flex-col h-full w-full">
                    <h3 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Comandas Abertas</h3>
                    <div id="openComandasContainer" class="flex flex-wrap gap-4"></div>
                    <div id="emptyComandasState" class="flex-col items-center justify-center h-48 text-gray-500 dark:text-gray-400">
                        <svg class="w-12 h-12 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                        <p class="font-medium">Nenhuma comanda aberta</p>
                    </div>
                </div>

                <!-- Products Tab Content -->
                <div id="produtosTabContent" class="flex flex-col w-full h-full">
                    
                    <!-- Categorias Section -->
                    <div id="categoriesGridSection" class="flex flex-col w-full flex-1">
                        <h3 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-slate-700 pb-2">Selecione uma categoria</h3>
                        <div id="categoriesContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4 overflow-y-auto pb-6">
                            <!-- Categorias renderizadas aqui -->
                        </div>
                    </div>

                    <!-- Produtos Section -->
                    <div id="productsGridSection" class="flex-col w-full flex-1">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 border-b border-gray-100 dark:border-slate-800 pb-3 gap-3">
                            <h3 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-gray-100" id="currentCategoryTitle">Todos</h3>
                            <button type="button" id="backToCategoriesBtn" class="flex items-center justify-center gap-2 text-sm font-bold text-brand-600 dark:text-brand-400 hover:text-brand-700 bg-brand-50 hover:bg-brand-100 dark:bg-brand-900/30 dark:hover:bg-brand-900/50 py-2 sm:py-1.5 px-4 rounded-xl sm:rounded-lg transition-colors border border-brand-100 dark:border-brand-900/50">
                                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                Categorias
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6 pb-24" id="productsContainer">
                            <!-- Produto Loader Placeholder -->
                            <div class="flex items-center justify-center col-span-full h-32">
                                <svg class="animate-spin h-8 w-8 text-brand-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            <!-- Mobile Fab Cart button -->
            <div class="fixed bottom-6 right-6 lg:hidden z-60">
                <button type="button" id="mobileCartBtn" class="bg-brand-600 hover:bg-brand-700 text-white w-14 h-14 rounded-full shadow-[0_10px_25px_-5px_rgba(0,0,0,0.3)] flex items-center justify-center transition-transform hover:scale-105 relative border border-brand-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span id="mobileCartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-white dark:border-slate-900">0</span>
                </button>
            </div>
        </div>

        <!-- Right Sidebar - Cart/Comanda -->
        <aside id="cartSidebar" class="bg-white dark:bg-slate-800 border-l border-gray-200 dark:border-slate-700 h-full flex flex-col cart-sidebar shadow-2xl z-30 transform transition-transform duration-300">
            <!-- Header Cart -->
            <div class="p-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50 dark:bg-slate-800/90 shadow-sm relative z-10">
                <div class="flex items-center gap-3">
                    <button type="button" id="closeCartBtn" title="Fechar carrinho" class="lg:hidden p-1 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors rounded-full hover:bg-gray-200 dark:hover:bg-slate-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="p-2 bg-brand-100 dark:bg-brand-900/40 rounded-lg text-brand-600 dark:text-brand-400 hidden lg:block">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100 leading-none">Minha Comanda</h2>
                        <span class="text-xs text-brand-600 dark:text-brand-400 font-medium" id="cartSideBadge">0 itens</span>
                    </div>
                </div>
                <button type="button" id="clearCartBtn" class="text-xs text-red-500 hover:text-red-700 dark:hover:text-red-400 font-medium px-2 py-1 rounded hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors hidden">
                    Limpar
                </button>
            </div>
            
            <!-- Cart Items ScrollArea -->
            <div class="flex-1 overflow-y-auto category-scroll bg-gray-50 dark:bg-slate-900/30" id="cartItemsContainer">
                <div class="flex flex-col items-center justify-center p-8 h-full text-center text-gray-500 dark:text-gray-400" id="emptyCartState">
                    <div class="w-16 h-16 bg-gray-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    </div>
                    <p class="font-medium text-gray-600 dark:text-gray-300 mb-1">Comanda está vazia</p>
                    <p class="text-xs">Selecione produtos para adicionar.</p>
                </div>
            </div>

            <!-- Cart Footer (Totals/Checkout) -->
            <div class="p-4 border-t border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] mt-auto z-10">
                <div class="space-y-3 mb-4">
                    <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 transition-all">
                        <span>Subtotal</span>
                        <span id="cartSubtotal" class="font-medium text-gray-900 dark:text-gray-200">R$ 0,00</span>
                    </div>
                    <!-- Taxa overlay 
                    <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 border-b border-gray-100 dark:border-slate-700 pb-2">
                        <span>Taxa/Serviço</span>
                        <span id="cartTax" class="font-medium text-gray-900 dark:text-gray-200">R$ 0,00</span>
                    </div>-->
                    <div class="flex justify-between items-end pt-1">
                        <span class="text-base font-medium text-gray-900 dark:text-gray-100">Total a pagar</span>
                        <span id="cartTotal" class="text-2xl font-black text-brand-600 dark:text-brand-400">R$ 0,00</span>
                    </div>
                </div>
                
                <div class="flex flex-col gap-2">
                    <button type="button" id="addObservationBtn" class="w-full bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-300 py-2.5 rounded-lg font-semibold text-sm hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors border border-gray-300 dark:border-slate-600 flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> 
                        Adicionar Observação
                    </button>
                    <button type="button" id="checkoutBtn" disabled class="w-full bg-brand-600 disabled:bg-gray-400 disabled:cursor-not-allowed hover:bg-brand-700 text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-brand-500/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Enviar Pedido
                    </button>
                </div>
            </div>
        </aside>
        </div>
    </main>

    <!-- Modal de Observação -->
    <div id="obsModal" class="hidden fixed inset-0 z-100 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-gray-900/80 transition-opacity" aria-hidden="true" id="obsModalBackdrop"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white dark:bg-slate-800 rounded-xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-b border-gray-200 dark:border-slate-700">
                    <h3 class="text-lg leading-6 font-bold text-gray-900 dark:text-gray-100" id="modal-title">Observações do Pedido</h3>
                </div>
                <div class="p-4 sm:p-6">
                    <label for="orderObs" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Instruções para a cozinha/preparo:</label>
                    <textarea id="orderObs" name="orderObs" rows="4" class="block w-full border border-gray-300 dark:border-slate-600 rounded-lg bg-gray-50 dark:bg-slate-700/50 text-gray-900 dark:text-gray-100 focus:ring-brand-500 focus:border-brand-500 p-3 text-sm resize-none shadow-inner" placeholder="Ex: Tirar cebola do lanche, carne ao ponto..."></textarea>
                </div>
                <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 flex flex-row-reverse dark:border-t dark:border-slate-700">
                    <button type="button" id="saveObsBtn" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:ml-3 sm:w-auto sm:text-sm">
                        Salvar Observação
                    </button>
                    <button type="button" id="cancelObsBtn" class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/restaurant.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>
</html>
