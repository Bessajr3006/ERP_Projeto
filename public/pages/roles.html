<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Perfil de Acesso</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <!-- Navbar Dinâmica -->
    <div id="app-navbar"></div>

    <!-- Main Content -->
    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">



        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <div class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <div id="rolesSection" class="bg-white dark:bg-slate-800 shadow-sm rounded-t-xl border border-b-0 border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-0">
                <div class="px-4 py-5 border-b border-gray-200 flex items-center justify-between">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">Cadastro de Perfis</h3>
                    <button type="button" id="btnNewRole" title="Novo Perfil"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent p-2 bg-brand-600 text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
                <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                        <thead class="sticky top-0 z-10 shadow-[0_1px_0_rgba(229,231,235,1)] dark:shadow-[0_1px_0_rgba(51,65,85,1)] bg-gray-50 dark:bg-slate-900/50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Perfil (Role)</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Identificador Técnico</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="rolesTable" class="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="rolesGridSection" class="hidden">
            </div>
        </div>

    </main>

    <!-- Modal Form -->
    <div id="entityModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true" id="modalBackdrop"></div>
            <!-- Modal Box -->
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
                <form id="entityForm" action="#" method="POST">
                    <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="lg:flex sm:items-start">
                            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100" id="modalTitle">
                                    Permissões do Perfil
                                </h3>
                                
                                <input type="hidden" id="entityRole" name="entityRole" value="" data-bwignore="true" data-lpignore="true" placeholder="">
                                
                                <div class="mt-6 mb-4">
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">Selecione os módulos que este perfil poderá acessar:</p>
                                    <div class="mb-3 flex flex-wrap gap-2">
                                        <button type="button" id="btnEnableAllModules"
                                            class="inline-flex items-center justify-center rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-xs font-semibold text-emerald-700 hover:bg-emerald-100 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:border-emerald-800/50 dark:bg-emerald-900/20 dark:text-emerald-300 dark:hover:bg-emerald-900/30">
                                            Ativar Todos
                                        </button>
                                        <button type="button" id="btnDisableAllModules"
                                            class="inline-flex items-center justify-center rounded-lg border border-red-200 bg-red-50 px-3 py-1.5 text-xs font-semibold text-red-700 hover:bg-red-100 focus:outline-none focus:ring-2 focus:ring-red-500 dark:border-red-800/50 dark:bg-red-900/20 dark:text-red-300 dark:hover:bg-red-900/30">
                                            Desativar Todos
                                        </button>
                                    </div>
                                    <div id="modulesCheckboxesContainer">
                                        <!-- Checkboxes gerados pelo JS -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 lg:flex lg:flex-row-reverse dark:border-t dark:border-slate-700">
                        <button type="submit" id="saveBtn"
                            class="w-full inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:ml-3 sm:w-auto sm:text-sm">
                            Salvar Permissões
                        </button>
                        <button type="button" id="btnCancelModal"
                            class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Form: Novo Perfil (Hidden by default) -->
    <div id="newRoleModal" class="hidden fixed inset-0 z-10005 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true" id="newRoleModalBackdrop"></div>
            <!-- Modal Box -->
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-xl sm:w-full">
                <form id="newRoleForm" action="#" method="POST">
                    <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100 mb-4" id="newRoleTitle">
                                Criar Novo Perfil
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <label for="newRoleName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome do Perfil</label>
                                    <input type="text" id="newRoleName" required class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="Ex: Auxiliar de Vendas" data-bwignore="true" data-lpignore="true" placeholder="">
                                </div>
                                <div>
                                    <label for="newRoleDesc" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Descrição (Opcional)</label>
                                    <input type="text" id="newRoleDesc" class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="O que este perfil pode acessar?" data-bwignore="true" data-lpignore="true" placeholder="">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 lg:flex lg:flex-row-reverse dark:border-t dark:border-slate-700">
                        <button type="submit" id="saveNewRoleBtn" class="w-full inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:ml-3 sm:w-auto sm:text-sm">
                            Criar
                        </button>
                        <button type="button" id="btnCancelNewRoleModal" class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-900/50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- App Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components/crud-manager.js"></script>
    <script src="/js/roles.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>

</html>
