<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Fornecedores</title>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body data-required-module="suppliers" class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <!-- Navbar -->
    <!-- Navbar Dinâmica -->
    <div id="app-navbar"></div>

    <!-- Main Content -->
    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">

        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <div class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <div class="bg-white dark:bg-slate-800 shadow-sm rounded-t-xl border border-b border-gray-200 dark:border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-2 shrink-0">
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">Fornecedores</h3>
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-white dark:bg-slate-800 p-1 rounded-full border border-gray-200 dark:border-slate-700 shadow-sm">
                        <button type="button" id="btnListView" title="Visualização em Lista"
                            class="flex items-center justify-center px-3 py-1.5 rounded-lg bg-brand-100 dark:bg-brand-900/40 text-brand-700 dark:text-brand-300 shadow-sm transition-all focus:outline-none gap-1">
                            <svg class="w-4 h-4 mr-1 check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <button type="button" id="btnGridView" title="Visualização em Cards"
                            class="flex items-center justify-center px-3 py-1.5 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all focus:outline-none gap-1">
                            <svg class="w-4 h-4 mr-1 check-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                            </svg>
                        </button>
                    </div>
                    <button type="button" id="btnOpenModal" title="Novo Fornecedor"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent p-2 bg-brand-600 text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </div>
            <!-- Tabela de Fornecedores -->
            <div id="suppliersSection" class="bg-white dark:bg-slate-800 shadow-sm border border-t-0 border-b-0 border-gray-200 dark:border-slate-700 flex flex-col flex-1 min-h-0">
                <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                        <thead class="sticky top-0 z-10 shadow-[0_1px_0_rgba(229,231,235,1)] dark:shadow-[0_1px_0_rgba(51,65,85,1)] bg-gray-50 dark:bg-slate-900/50">
                            <tr>
                                <th scope="col" class="px-3 py-3 text-left w-12">
                                    <input type="checkbox" id="selectAll" name="selectAll" title="Selecionar todos os fornecedores" aria-label="Selecionar todos os fornecedores"
                                        class="rounded border-gray-300 dark:border-slate-600 text-brand-600 shadow-sm focus:border-brand-300 focus:ring focus:ring-brand-200 focus:ring-opacity-50 dark:bg-slate-800 cursor-pointer" data-bwignore="true" data-lpignore="true">
                                </th>
                                <th scope="col"
                                    class="px-3 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider w-16">
                                    ID</th>
                                <th scope="col"
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Nome</th>
                                <th scope="col"
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Documento</th>
                                <th scope="col"
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Contato</th>
                                <th scope="col"
                                    class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                                    Ações</th>
                            </tr>
                        </thead>
                        <tbody id="suppliersTable"
                            class="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="6" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">
                                    Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Paginação da tabela -->
                <div id="suppliersPaginationContainer" class="px-4 py-2 border-t border-gray-200 dark:border-slate-700"></div>
            </div>

            <!-- Grid de Fornecedores (Cards) -->
            <div id="suppliersGridSection"
                class="overflow-y-auto flex-1 min-h-0 p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-4 content-start"><div class="col-span-full flex flex-col items-center justify-center py-12 gap-2">
            <svg class="w-10 h-10 text-gray-300 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p class="text-sm text-gray-400 dark:text-gray-500">Nenhum fornecedor encontrado.</p>
        </div></div><div id="suppliersResultsFooter" class="shrink-0 bg-white dark:bg-slate-800 border border-t-0 border-gray-200 dark:border-slate-700 px-5 py-3 rounded-b-xl shadow-sm flex items-center justify-between gap-4" role="status" aria-live="polite">
                <span class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"></path>
                    </svg>
                    <span data-grid-footer-count="" class="font-semibold text-gray-700 dark:text-gray-200">0</span>
                    <span data-grid-footer-label="">fornecedor(es) exibido(s)</span>
                </span>
            </div>
            <!-- Paginação do grid -->
            <div id="suppliersGridPaginationContainer" class="hidden px-2 py-2"></div>

        </div>

    </main>

    <!-- Modal Form (Hidden by default) -->
    <div id="entityModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-900/60 dark:bg-slate-950/80 backdrop-blur-sm transition-opacity" aria-hidden="true"
                id="modalBackdrop"></div>
            <!-- Modal Box -->
            <div
                class="modal-panel relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-gray-200 dark:border-slate-700">
                <form id="entityForm" action="#" method="POST">
                    <!-- Header with Tabs -->
                    <div
                        class="bg-white dark:bg-slate-800 px-4 pt-5 sm:px-6 border-b border-gray-200 dark:border-slate-700">
                        <div class="sm:flex sm:items-start">
                            <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100"
                                    id="modalTitle">Nova Entidade</h3>

                                <div class="mt-4">
                                    <ul class="flex flex-wrap -mb-px text-sm font-medium text-center">
                                        <li class="mr-2">
                                            <button type="button" id="tabBtn-data"
                                                class="inline-block px-4 py-3 border-b-2 rounded-t-lg active text-brand-600 border-brand-600 dark:text-brand-500 dark:border-brand-500">Dados
                                                do Fornecedor</button>
                                        </li>
                                        <li class="mr-2">
                                            <button type="button" id="tabBtn-docs"
                                                class="inline-block px-4 py-3 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300 text-gray-500 dark:text-gray-400">Documentos
                                                Anexos</button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Inner Form Area -->
                    <div class="bg-white dark:bg-slate-800 px-4 py-5 sm:p-6">
                        <input type="hidden" id="entityType" name="entityType" value="supplier" data-bwignore="true" data-lpignore="true" placeholder="">
                        <input type="hidden" id="entityId" name="entityId" value="" data-bwignore="true" data-lpignore="true" placeholder="">

                        <!-- Dados do Cliente Tab -->
                        <div id="tabContent-data" class="block space-y-4">

                            <div>
                                <label for="entityName"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Razão Social
                                    / Nome <span class="text-red-500">*</span></label>
                                <input type="text" id="entityName" name="entityName"
                                    class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                            </div>
                            <div>
                                <label for="entityDoc"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">CPF/CNPJ</label>
                                <input type="text" id="entityDoc" name="entityDoc"
                                    class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="entityEmail"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                                    <input type="email" id="entityEmail" name="entityEmail" autocomplete="off"
                                        class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                </div>
                                <div>
                                    <label for="entityPhone"
                                        class="block text-sm font-medium text-gray-700 dark:text-gray-300">Telefone</label>
                                    <input type="text" id="entityPhone" name="entityPhone"
                                        class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                </div>
                            </div>

                            <div class="pt-4 mt-4 border-t border-gray-200 dark:border-slate-700">
                                <h4 class="text-sm font-medium text-gray-900 dark:text-gray-100 mb-3">Endereço
                                </h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div class="sm:col-span-1">
                                        <label for="entityZipcode"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">CEP</label>
                                        <div class="relative">
                                            <input type="text" id="entityZipcode" name="entityZipcode" placeholder="00000-000"
                                                class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                            <div id="cepLoading"
                                                class="hidden absolute inset-y-0 right-0 pr-3 items-center pointer-events-none">
                                                <svg class="animate-spin h-5 w-5 text-brand-500"
                                                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                        stroke="currentColor" stroke-width="4">
                                                    </circle>
                                                    <path class="opacity-75" fill="currentColor"
                                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                                    </path>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="sm:col-span-1 hidden sm:block"></div>

                                    <div class="sm:col-span-2">
                                        <label for="entityStreet"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Logradouro
                                            / Rua</label>
                                        <input type="text" id="entityStreet" name="entityStreet"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>

                                    <div class="sm:col-span-1">
                                        <label for="entityNumber"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Número</label>
                                        <input type="text" id="entityNumber" name="entityNumber"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>

                                    <div class="sm:col-span-1">
                                        <label for="entityComplement"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Complemento</label>
                                        <input type="text" id="entityComplement" name="entityComplement" placeholder="Apto, Sala..."
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>

                                    <div class="sm:col-span-2">
                                        <label for="entityNeighborhood"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Bairro</label>
                                        <input type="text" id="entityNeighborhood" name="entityNeighborhood"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>

                                    <div class="sm:col-span-1">
                                        <label for="entityCity"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Cidade</label>
                                        <input type="text" id="entityCity" name="entityCity"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>

                                    <div class="sm:col-span-1">
                                        <label for="entityState"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Estado (UF)</label>
                                        <select id="entityState" name="entityState"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true">
                                            <option value="">Selecione...</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <!-- Documentos Anexos Tab -->
                        <div id="tabContent-docs" class="hidden space-y-4 pt-2">
                            <div
                                class="bg-gray-50 dark:bg-slate-900/50 p-4 rounded-md border border-gray-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Certificado
                                    Digital</label>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                                    <div class="sm:col-span-2 flex items-center">
                                        <label for="entityCertFile"
                                            class="cursor-pointer bg-white dark:bg-slate-700 py-2 px-3 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm text-sm leading-4 font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                                            <span>Escolher arquivo</span>
                                            <input id="entityCertFile" name="entityCertFile" type="file" class="sr-only"
                                                accept=".pfx,.p12,.pdf,.png,.jpg,.jpeg" data-bwignore="true" data-lpignore="true" placeholder="">
                                        </label>
                                        <span id="entityCertFileName"
                                            class="ml-3 text-sm text-gray-500 dark:text-gray-400 truncate">Nenhum
                                            arquivo
                                            selecionado</span>
                                    </div>
                                    <div>
                                        <label for="entityCertPassword"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Senha do
                                            Certificado</label>
                                        <div class="relative mt-1">
                                            <input type="password" id="entityCertPassword" name="entityCertPassword" autocomplete="new-password"
                                                class="block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm pr-10" data-bwignore="true" data-lpignore="true" placeholder="">
                                            <button type="button" tabindex="-1" id="btnToggleCertPassword" title="Mostrar ou ocultar senha do certificado" aria-label="Mostrar ou ocultar senha do certificado"
                                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-500 focus:outline-none">
                                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                                    stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2"
                                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <label for="entityCertExpiration"
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Data de
                                            Validade</label>
                                        <input type="date" id="entityCertExpiration" name="entityCertExpiration"
                                            class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contrato
                                    Social</label>
                                <div class="mt-1 flex items-center">
                                    <label for="entityContractFile"
                                        class="cursor-pointer bg-white dark:bg-slate-700 py-2 px-3 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm text-sm leading-4 font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                                        <span>Escolher arquivo</span>
                                        <input id="entityContractFile" name="entityContractFile" type="file" class="sr-only"
                                            accept=".pdf,.png,.jpg,.jpeg" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </label>
                                    <span id="entityContractFileName"
                                        class="ml-3 text-sm text-gray-500 dark:text-gray-400 truncate">Nenhum arquivo
                                        selecionado</span>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Cartão
                                    CNPJ</label>
                                <div class="mt-1 flex items-center">
                                    <label for="entityCnpjFile"
                                        class="cursor-pointer bg-white dark:bg-slate-700 py-2 px-3 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm text-sm leading-4 font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
                                        <span>Escolher arquivo</span>
                                        <input id="entityCnpjFile" name="entityCnpjFile" type="file" class="sr-only"
                                            accept=".pdf,.png,.jpg,.jpeg" data-bwignore="true" data-lpignore="true" placeholder="">
                                    </label>
                                    <span id="entityCnpjFileName"

                        <button type="submit" id="saveBtn"
