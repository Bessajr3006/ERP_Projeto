<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Tarefas</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <!-- Navbar Dinâmica -->
    <div id="app-navbar"></div>

    <!-- Main Content -->
    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-x-hidden overflow-y-auto">

        <!-- Cabeçalho -->
        <div class="px-4 sm:px-0 mb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100">Tarefas</h1>
            </div>
            
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                <!-- Filtros Rápidos (Apenas Ícones) -->
                <div class="flex items-center bg-white dark:bg-slate-800 px-1 py-1 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-x-auto">
                    <button type="button" class="task-filter-btn flex items-center justify-center p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" data-filter="all" title="Todas as Tarefas">
                        <svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
                    </button>
                    <button type="button" class="task-filter-btn flex items-center justify-center p-2 rounded-lg text-brand-600 dark:text-brand-400 bg-brand-50 dark:bg-brand-900/30 transition-colors" data-filter="pending" title="A Fazer">
                        <svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                    </button>
                    <button type="button" class="task-filter-btn flex items-center justify-center p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" data-filter="progress" title="Em Andamento">
                        <svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                    <button type="button" class="task-filter-btn flex items-center justify-center p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" data-filter="completed" title="Concluídas">
                        <svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                </div>

                <!-- Botão Nova Tarefa -->
                <button type="button" id="btnOpenTaskModal"
                    class="inline-flex items-center justify-center rounded-lg border border-transparent px-4 py-2 bg-brand-600 text-sm font-medium text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                    Nova Tarefa
                </button>

                <!-- Modo de Visão -->
                <div class="flex items-center bg-gray-100 dark:bg-slate-800 p-1 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-x-auto">
                    <button type="button" class="view-mode-btn active relative flex items-center justify-center gap-2 px-3 py-1.5 text-sm font-medium rounded-lg text-brand-700 dark:text-brand-300 bg-white dark:bg-slate-700 shadow-sm transition-all whitespace-nowrap" data-view="list">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                        Lista
                    </button>
                    <button type="button" class="view-mode-btn relative flex items-center justify-center gap-2 px-3 py-1.5 text-sm font-medium rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-all whitespace-nowrap" data-view="day">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Dia
                    </button>
                    <button type="button" class="view-mode-btn relative flex items-center justify-center gap-2 px-3 py-1.5 text-sm font-medium rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-all whitespace-nowrap" data-view="calendar">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        Mês
                    </button>
                </div>
            </div>
        </div>

        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <!-- Layout Central do To-Do -->
        <div class="px-4 sm:px-0 flex flex-col gap-6">

            <!-- Lista/Agenda (largura total) -->
            <div class="w-full flex flex-col space-y-4 min-w-0">
                


                <!-- Lista (Contêiner Principal que recebe injeção de HTML) -->
                <div id="tasksListContainer" class="pb-8">
                    <ul id="tasksList" class="grid grid-cols-1 lg:grid-cols-2 gap-3">
                        <li class="bg-white dark:bg-slate-800 rounded-2xl p-6 text-center text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-slate-700 shadow-sm">
                            <p>Carregando dados...</p>
                        </li>
                    </ul>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Modal Nova / Editar Tarefa -->
    <div id="taskModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="taskModalTitle" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div id="taskModalBackdrop" class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true"></div>
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="px-6 pt-5 pb-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 id="taskModalTitle" class="text-lg font-semibold text-gray-900 dark:text-gray-100">Nova Tarefa</h3>
                        <button type="button" id="btnCloseTaskModal" title="Fechar" aria-label="Fechar modal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors focus:outline-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <form id="taskForm" class="space-y-4" action="#" method="POST">
                        <input type="hidden" id="taskId" data-bwignore="true" data-lpignore="true">

                        <div>
                            <label for="taskDueDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Data e Hora</label>
                            <input type="datetime-local" id="taskDueDate" name="taskDueDate"
                                class="mt-1 block w-full rounded-lg border border-gray-300 dark:border-slate-600 px-3 py-2 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-brand-500 sm:text-sm bg-gray-50 dark:bg-slate-900/50 text-gray-900 dark:text-gray-100" data-bwignore="true" data-lpignore="true" placeholder="">
                        </div>

                        <div>
                            <label for="taskPersonType" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Vincular Tarefa (Opcional)</label>
                            <select id="taskPersonType" name="taskPersonType" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 py-2 px-3 focus:ring-brand-500 focus:border-brand-500 sm:text-sm text-gray-900 dark:text-gray-100" data-bwignore="true" data-lpignore="true">
                                <option value="">Sem vínculo</option>
                                <option value="customer">Cliente</option>
                                <option value="seller">Vendedor</option>
                                <option value="buyer">Comprador</option>
                                <option value="service_provider">Prestador de Serviço</option>
                                <option value="supplier">Fornecedor</option>
                                <option value="company">Empresa</option>
                            </select>
                        </div>

                        <div id="taskPersonIdWrapper" class="hidden">
                            <label for="taskPersonId" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Pessoa Vinculada</label>
                            <select id="taskPersonId" name="taskPersonId" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 py-2 px-3 focus:ring-brand-500 focus:border-brand-500 sm:text-sm text-gray-900 dark:text-gray-100" data-bwignore="true" data-lpignore="true">
                                <option value="">Selecione o tipo primeiro...</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label for="taskUserId" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Responsável</label>
                                <select id="taskUserId" name="taskUserId"
                                        class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 py-2 px-3 focus:ring-brand-500 focus:border-brand-500 sm:text-sm text-gray-900 dark:text-gray-100" data-bwignore="true" data-lpignore="true">
                                    <option value="" selected>Todos</option>
                                </select>
                            </div>
                            <div>
                                <label for="taskStatus" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Status</label>
                                <select id="taskStatus" name="taskStatus"
                                        class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 py-2 px-3 focus:ring-brand-500 focus:border-brand-500 sm:text-sm text-gray-900 dark:text-gray-100" data-bwignore="true" data-lpignore="true">
                                    <option value="pending" selected>A Fazer</option>
                                    <option value="progress">Em Andamento</option>
                                    <option value="completed">Concluída</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="taskTitle" class="block text-sm font-medium text-gray-700 dark:text-gray-300">O que precisa ser feito?</label>
                            <textarea id="taskTitle" name="taskTitle" rows="3" required placeholder="Ex: Fechar o caixa do dia..."
                                      class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 py-2 px-3 focus:ring-brand-500 focus:border-brand-500 sm:text-sm text-gray-900 dark:text-gray-100 resize-none"></textarea>

                            <div class="mt-2 flex flex-wrap gap-2">
                                <button type="button" id="btnAttachFile" class="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-slate-600 shadow-sm text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none transition-colors">
                                    <svg class="h-4 w-4 mr-1.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                    Anexar Arquivo
                                </button>
                                <input type="file" id="taskFileInput" name="taskFileInput" class="hidden" multiple title="Selecionar arquivos" aria-label="Selecionar arquivos" data-bwignore="true" data-lpignore="true">

                                <button type="button" id="btnRecordAudio" class="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-slate-600 shadow-sm text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none transition-colors">
                                    <svg class="h-4 w-4 mr-1.5 text-gray-400" id="iconMic" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                                    <span id="audioRecordText">Gravar Áudio</span>
                                </button>
                            </div>
                            <div id="attachmentsPreview" class="mt-3 flex flex-wrap gap-2 empty:hidden"></div>
                        </div>

                        <div class="pt-4 flex items-center justify-end gap-3 border-t border-gray-100 dark:border-slate-700/50">
                            <button type="button" id="btnCancelModal" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">Fechar</button>
                            <button type="submit" id="btnSaveTask" class="inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-5 py-2 bg-brand-600 text-sm font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                                Adicionar Tarefa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- App Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/tasks.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>
</html>
