<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Tributação Federal</title>
    <link href="/css/style.css" rel="stylesheet">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body data-required-module="service_types" class="bg-gray-100 dark:bg-slate-900 text-gray-800 font-sans flex flex-col h-dvh overflow-hidden">

    <div id="app-navbar"></div>

    <main class="pt-4 pb-4 max-w-7xl mx-auto w-full sm:px-6 lg:px-8 flex flex-col flex-1 min-h-0 overflow-hidden">
        <div id="alertMessage" class="hidden mx-4 sm:mx-0 mb-4 p-4 rounded-xl text-sm"></div>

        <div class="px-4 sm:px-0 flex flex-col flex-1 min-h-0">
            <div class="bg-white dark:bg-slate-800 shadow-sm rounded-t-xl border border-b border-gray-200 dark:border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-2 shrink-0">
                <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">Tributação Federal</h3>
                <div class="flex items-center gap-3">
                    <div class="relative w-full sm:w-72">
                        <input type="text" id="filterSearch" placeholder="Buscar por referência ou situação tributária"
                            class="w-full rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 py-2 pl-10 pr-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="flex items-center bg-white dark:bg-slate-800 p-1 rounded-full border border-gray-200 dark:border-slate-700 shadow-sm">
                        <button type="button" id="btnListView" title="Visualização em Lista"
                            class="flex items-center justify-center px-3 py-1.5 rounded-lg bg-brand-100 dark:bg-brand-900/40 text-brand-700 dark:text-brand-300 shadow-sm transition-all focus:outline-none gap-1">
                            <svg class="w-4 h-4 mr-1 check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <button type="button" id="btnGridView" title="Visualização em Cards"
                            class="flex items-center justify-center px-3 py-1.5 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all focus:outline-none gap-1">
                            <svg class="w-4 h-4 mr-1 check-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                            </svg>
                        </button>
                    </div>
                    <button type="button" id="btnOpenModal" title="Nova Referência"
                        class="inline-flex items-center justify-center rounded-lg border border-transparent p-2 bg-brand-600 text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </div>

            <div id="federalTaxSection" class="bg-white dark:bg-slate-800 shadow-sm border border-t-0 border-gray-200 dark:border-slate-700 rounded-b-xl flex flex-col flex-1 min-h-0">
                <div class="overflow-x-auto overflow-y-auto flex-1 min-h-0">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-slate-700">
                        <thead class="sticky top-0 z-10 bg-gray-50 dark:bg-slate-900/50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Referência</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Situação / Retenção</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Tributos Retidos</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Simples Nacional</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="federalTaxTable" class="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                            <tr>
                                <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500 dark:text-gray-400">Nenhuma referência cadastrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="federalTaxGridSection" class="hidden bg-white dark:bg-slate-800 shadow-sm border border-t-0 border-gray-200 dark:border-slate-700 rounded-b-xl overflow-y-auto flex-1 min-h-0 p-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 content-start"></div>

            <div id="federalTaxResultsFooter" class="shrink-0 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 px-5 py-3 rounded-xl shadow-sm flex items-center justify-between gap-4 mt-2" role="status" aria-live="polite">
                <span class="text-xs text-gray-500 dark:text-gray-400">Exibindo <span data-grid-footer-range class="font-semibold text-gray-700 dark:text-gray-200">0-0</span> de <span data-grid-footer-total class="font-semibold text-gray-700 dark:text-gray-200">0</span></span>
                <span class="text-xs text-gray-400 dark:text-gray-500">referência(s) filtrada(s)</span>
            </div>
        </div>
    </main>

    <div id="federalTaxModal" class="hidden fixed inset-0 z-10000 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center lg:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500/75 dark:bg-slate-900/80 transition-opacity" aria-hidden="true" id="modalBackdrop"></div>
            <div class="relative z-10 inline-block align-bottom bg-white dark:bg-slate-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-5xl sm:w-full">
                <form id="federalTaxForm" action="#" method="POST">
                    <div class="bg-white dark:bg-slate-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4 max-h-[80vh] overflow-y-auto">
                        <div class="mt-3 text-center sm:mt-0 sm:text-left w-full space-y-6">
                            <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100" id="modalTitle">Nova Referência de Tributação Federal</h3>

                            <input type="hidden" id="federalTaxId" name="federalTaxId" value="">

                            <div>
                                <label for="referenceName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Referência <span class="text-red-500">*</span></label>
                                <input type="text" id="referenceName" name="referenceName" required
                                    class="mt-1 block w-full bg-white dark:bg-slate-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="Ex: NFS-e 06/2026 - Serviço de Consultoria">
                            </div>

                            <section class="space-y-4">
                                <h4 class="text-base font-semibold text-emerald-700 dark:text-emerald-400 uppercase tracking-wide">Tributação Federal</h4>

                                <div>
                                    <label for="pisCofinsSituation" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Situação Tributária do PIS/COFINS <span class="text-red-500">*</span></label>
                                    <select id="pisCofinsSituation" name="pisCofinsSituation" required
                                        class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                                        <option value="">Selecione...</option>
                                        <option value="tributavel">Tributável</option>
                                        <option value="aliquota_zero">Alíquota Zero</option>
                                        <option value="isenta">Isenta</option>
                                        <option value="nao_tributavel">Não Tributável</option>
                                        <option value="suspensa">Suspensa</option>
                                    </select>
                                </div>

                                <div>
                                    <label for="retentionType" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo de retenção do PIS/COFINS/CSLL <span class="text-red-500">*</span></label>
                                    <select id="retentionType" name="retentionType" required
                                        class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-slate-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm">
                                        <option value="">Selecione...</option>
                                        <option value="sem_retencao">Sem retenção</option>
                                        <option value="retencao_parcial">Retenção parcial</option>
                                        <option value="retencao_total">Retenção total</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label for="irrfValue" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">IRRF</label>
                                        <div class="flex rounded-md overflow-hidden border border-gray-300 dark:border-slate-600">
                                            <span class="inline-flex items-center px-3 bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300 text-sm font-medium">R$</span>
                                            <input type="number" id="irrfValue" name="irrfValue" min="0" step="0.01"
                                                class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                                                placeholder="0,00">
                                        </div>
                                    </div>

                                    <div>
                                        <label for="socialContributionsRetained" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contribuições Sociais - Retidas</label>
                                        <div class="flex rounded-md overflow-hidden border border-gray-300 dark:border-slate-600">
                                            <span class="inline-flex items-center px-3 bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300 text-sm font-medium">R$</span>
                                            <input type="number" id="socialContributionsRetained" name="socialContributionsRetained" min="0" step="0.01"
                                                class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                                                placeholder="0,00">
                                        </div>
                                    </div>

                                    <div>
                                        <label for="socialSecurityRetained" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contribuição Previdenciária - Retida</label>
                                        <div class="flex rounded-md overflow-hidden border border-gray-300 dark:border-slate-600">
                                            <span class="inline-flex items-center px-3 bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300 text-sm font-medium">R$</span>
                                            <input type="number" id="socialSecurityRetained" name="socialSecurityRetained" min="0" step="0.01"
                                                class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                                                placeholder="0,00">
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section class="pt-4 border-t border-gray-200 dark:border-slate-700 space-y-4">
                                <h4 class="text-base font-semibold text-emerald-700 dark:text-emerald-400 uppercase tracking-wide">Valor Aproximado dos Tributos</h4>
                                <div class="space-y-2">
                                    <label class="inline-flex items-center gap-2 text-gray-700 dark:text-gray-300">
                                        <input type="radio" name="approxTaxMode" value="monetary" class="text-brand-600 focus:ring-brand-500">
                                        <span>Preencher os valores monetários em cada NFS-e emitida</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2 text-gray-700 dark:text-gray-300">
                                        <input type="radio" name="approxTaxMode" value="percentage" class="text-brand-600 focus:ring-brand-500">
                                        <span>Configurar os valores percentuais correspondentes</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2 text-gray-700 dark:text-gray-300">
                                        <input type="radio" name="approxTaxMode" value="simples_nacional" checked class="text-brand-600 focus:ring-brand-500">
                                        <span>Informar alíquota do Simples Nacional</span>
                                    </label>
                                </div>

                                <div class="max-w-md">
                                    <label for="simplesNationalRate" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Alíquota no Simples Nacional <span class="text-red-500">*</span></label>
                                    <div class="flex rounded-md overflow-hidden border border-gray-300 dark:border-slate-600">
                                        <input type="number" id="simplesNationalRate" name="simplesNationalRate" min="0" step="0.01"
                                            class="block w-full bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-gray-100 py-2 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                                            placeholder="0,00">
                                        <span class="inline-flex items-center px-3 bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-300 text-sm font-medium">%</span>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-slate-800/80 px-4 py-3 sm:px-6 flex flex-row-reverse dark:border-t dark:border-slate-700">
                        <button type="submit" id="saveBtn"
                            class="w-full inline-flex items-center justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-brand-600 text-base font-medium text-white hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:ml-3 sm:w-auto sm:text-sm">Salvar</button>
                        <button type="button" id="btnCancelModal"
                            class="mt-3 w-full inline-flex items-center justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancelar</button>
                        <button type="button" id="btnResetFederalTax"
                            class="mt-3 w-full inline-flex items-center justify-center rounded-lg border border-gray-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Limpar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/tributacao_federal.js"></script>
    <script src="/js/components/navbar.js"></script>

    <div id="app-footer" class="shrink-0"></div>
    <script src="/js/components/footer.js"></script>
</body>

</html>
