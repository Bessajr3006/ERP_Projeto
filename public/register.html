<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KEYSTONE - Cadastro</title>
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icon-192x192-v3.png">
    <script src="/js/pwa.js"></script>
</head>

<body class="bg-gray-50 dark:bg-slate-900 min-h-screen flex flex-col">

    <main class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Nova Empresa</h1>
        </div>

        <div id="alertMessage" class="hidden mb-4 p-4 rounded-md text-sm"></div>

        <form id="registerForm" class="space-y-6">
            <div>
                <label for="cnpj" class="block text-sm font-medium text-gray-700 dark:text-gray-300">CNPJ (Obrigatório)</label>
                <div class="relative">
                    <input type="text" id="cnpj" required placeholder="00.000.000/0000-00"
                        class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500">
                    <div id="cnpjLoading"
                        class="hidden absolute inset-y-0 right-0 pr-3 items-center pointer-events-none">
                        <svg class="animate-spin h-5 w-5 text-brand-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                </div>
                <p id="cnpjError" class="hidden text-xs text-red-600 mt-1">CNPJ inválido ou não encontrado.</p>
            </div>

            <div>
                <label for="companyName" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome da Empresa</label>
                <input type="text" id="companyName" required autocomplete="organization"
                    class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500 transition-colors">
            </div>

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contato</label>
                <input type="text" id="name" required autocomplete="name"
                    class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email da Empresa</label>
                <input type="email" id="email" autocomplete="username"
                    class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500">
            </div>

            <div>
                <label for="whatsapp" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Telefone da Empresa (Opcional)</label>
                <input type="text" id="whatsapp" autocomplete="tel" placeholder="(00) 00000-0000"
                    class="mt-1 block w-full px-4 py-3 bg-white dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full inline-flex items-center justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                Cadastra Empresa
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
            Já tem uma conta? <a href="/index.html" class="text-brand-600 hover:text-brand-500 font-medium">Faça
                login</a>
        </div>

        <div class="mt-4 flex justify-center">
            <button type="button"
                class="pwaInstallBtn hidden rounded-lg border border-brand-600 px-4 py-2 text-sm font-semibold text-brand-600 hover:bg-brand-50 dark:border-brand-400 dark:text-brand-400 dark:hover:bg-slate-700">
                Instalar App
            </button>
        </div>
    </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/register.js"></script>


</body>

</html>
